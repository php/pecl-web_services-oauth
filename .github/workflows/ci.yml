name: CI
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: PHP ${{ matrix.version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        version: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.version }}

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev libpcre3-dev

      - name: Run phpize
        run: phpize

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Run tests
        run: make test
